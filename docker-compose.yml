name: sandbank-n8n-local

networks:
  sandbank_n8n_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sandbank_n8n_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - ./runtime/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sandbank_n8n_net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ./runtime/ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - sandbank_n8n_net

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sandbank_n8n_net

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      SEARXNG_BASE_URL: http://localhost:8088/
      UWSGI_WORKERS: "2"
      UWSGI_THREADS: "2"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./runtime/searxng:/var/cache/searxng
    ports:
      - "127.0.0.1:8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/search?q=sandbank&format=json >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - sandbank_n8n_net

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.9.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      TZ: ${TZ}
      GENERIC_TIMEZONE: ${TZ}
      NODE_ENV: production

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_LOG_LEVEL: info
      N8N_SECURE_COOKIE: "false"

      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}

      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OBSIDIAN_REST_URL: ${OBSIDIAN_REST_URL}
      OBSIDIAN_REST_API_KEY: ${OBSIDIAN_REST_API_KEY}
      OBSIDIAN_NOTES_DIR: ${OBSIDIAN_NOTES_DIR}
      OBSIDIAN_ALLOW_INSECURE_TLS: ${OBSIDIAN_ALLOW_INSECURE_TLS}
      GOOGLE_SHEETS_LOGGING_ENABLED: ${GOOGLE_SHEETS_LOGGING_ENABLED}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runtime/n8n:/home/node/.n8n
      - ./n8n/workflows:/workflows
      - ./local-files:/files
    networks:
      - sandbank_n8n_net
